services:
  app:
    build: .
    container_name: document-formatter-app
    ports:
      - "8000:8000"
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./app/storage:/app/app/storage
      - ./logs:/app/logs
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    profiles:
      - local-chat
    container_name: document-formatter-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    restart: unless-stopped

volumes:
  ollama:

