<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Обработка документов</title>
    <style>
        /* ... (Стили остаются те же самые, что были раньше) ... */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; padding: 50px; margin: 0; }
        .container { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 800px; }
        h1 { text-align: center; color: #333; margin-bottom: 2rem; }
        .upload-zone { border: 2px dashed #4caf50; border-radius: 8px; padding: 20px; text-align: center; transition: background 0.3s; margin-bottom: 20px; position: relative; }
        .upload-zone:hover { background-color: #f1f8f1; }
        .upload-zone input[type="file"] { position: absolute; left: 0; top: 0; opacity: 0; width: 100%; height: 100%; cursor: pointer; }
        .upload-icon { font-size: 2rem; color: #4caf50; }
        .file-name { margin-top: 10px; font-size: 0.9rem; color: #666; font-style: italic; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .btn-main { width: 100%; padding: 12px; background-color: #4caf50; color: white; border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; transition: background 0.2s; }
        .btn-main:hover { background-color: #45a049; }
        .btn-main:disabled { background-color: #ccc; cursor: not-allowed; }
        .status-box { background-color: #e8f5e9; border: 1px solid #c8e6c9; border-radius: 8px; padding: 15px; margin-bottom: 20px; display: none; }
        .status-item { margin-bottom: 5px; font-size: 0.95rem; color: #2e7d32; }
        .chat-section { margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px; display: none; }
        .chat-header { font-size: 1.2rem; margin-bottom: 15px; color: #333; }
        .chat-box { height: 300px; overflow-y: auto; border: 1px solid #ddd; border-radius: 8px; padding: 15px; background-color: #fafafa; margin-bottom: 15px; }
        .message { margin-bottom: 12px; max-width: 80%; padding: 10px 14px; border-radius: 12px; line-height: 1.4; font-size: 0.95rem; }
        .message.user { background-color: #4caf50; color: white; margin-left: auto; text-align: right; }
        .message.assistant { background-color: #fff; border: 1px solid #e0e0e0; color: #333; }
        .input-group { display: flex; gap: 10px; }
        .input-group input { flex-grow: 1; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 1rem; }
        .loading { display: none; text-align: center; color: #888; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="container">
    <h1>Обработка документов</h1>

    <div class="grid">
        <div class="upload-zone" id="zone-doc">
            <div class="upload-icon">📄</div>
            <div><strong>Загрузите Документ</strong></div>
            <div>Перетащите или выберите файл</div>
            <input type="file" id="input-doc" accept=".pdf,.docx,.txt" onchange="updateFileName(this, 'doc-name')">
            <div class="file-name" id="doc-name"></div>
        </div>
        <div class="upload-zone" id="zone-instr">
            <div class="upload-icon">📖</div>
            <div><strong>Загрузите инструкцию</strong></div>
            <div>Перетащите или выберите файл</div>
            <input type="file" id="input-instr" accept=".pdf,.docx,.txt" onchange="updateFileName(this, 'instr-name')">
            <div class="file-name" id="instr-name"></div>
        </div>
    </div>

    <button class="btn-main" onclick="processFiles()" id="btn-process">Генерировать</button>

    <div class="status-box" id="status-box">
        <div class="status-item" id="status-doc"></div>
        <div class="status-item" id="status-instr"></div>
        <div class="status-item" style="font-weight: bold; margin-top: 10px;" id="status-graph"></div>
    </div>

    <div class="chat-section" id="chat-section">
        <div class="chat-header">Чат с инструкцией</div>
        <div class="chat-box" id="chat-box">
            <div class="message assistant">Здравствуйте! Файлы загружены. Задайте вопрос по инструкции.</div>
        </div>
        <div class="loading" id="loading-indicator">Печатает...</div>
        <div class="input-group">
            <input type="text" id="question-input" placeholder="Например: Какие требования к шрифту?" onkeydown="if(event.key==='Enter') sendQuestion()">
            <button class="btn-main" onclick="sendQuestion()" style="width: auto; padding: 10px 20px;">Отправить</button>
        </div>
    </div>
</div>

<script>
    let currentDocFile = null;
    let currentInstrFile = null;

    function updateFileName(input, spanId) {
        const span = document.getElementById(spanId);
        if (input.files.length > 0) {
            span.textContent = input.files[0].name;
            if (spanId === 'doc-name') currentDocFile = input.files[0];
            if (spanId === 'instr-name') currentInstrFile = input.files[0];
        }
    }

    async function processFiles() {
        const btn = document.getElementById('btn-process');
        const statusBox = document.getElementById('status-box');

        if (!currentDocFile || !currentInstrFile) {
            alert("Пожалуйста, выберите оба файла.");
            return;
        }

        btn.disabled = true;
        btn.textContent = "Обработка...";

        // --- ИСПРАВЛЕНИЕ: Используем FormData ---
        const formData = new FormData();
        formData.append('document', currentDocFile);
        formData.append('instruction', currentInstrFile);
        // ----------------------------------------

        try {
            const response = await fetch('/generate', {
                method: 'POST',
                body: formData // Отправляем FormData, а не JSON
            });

            if (!response.ok) {
                // Пытаемся прочитать текст ошибки от сервера
                const errorText = await response.text();
                throw new Error(errorText);
            }

            const result = await response.json();

            statusBox.style.display = 'block';
            document.getElementById('status-doc').innerText = `Документ: ${result.document.name} (${result.document.char_count} симв.)`;
            document.getElementById('status-instr').innerText = `Инструкция: ${result.instruction.name} (${result.instruction.char_count} симв.)`;

            if (result.processing_details) {
                const entities = result.processing_details.entities_count || 0;
                document.getElementById('status-graph').innerText = `База знаний построена: найдено ${entities} сущностей.`;
            }

            document.getElementById('chat-section').style.display = 'block';
            btn.textContent = "Обновить";

        } catch (error) {
            console.error(error);
            alert("Ошибка при обработке: " + error.message);
        } finally {
            btn.disabled = false;
        }
    }

    async function sendQuestion() {
    const input = document.getElementById('question-input');
    const question = input.value.trim();
    if (!question) return;

    const chatBox = document.getElementById('chat-box');
    const loading = document.getElementById('loading-indicator');

    addMessage(question, 'user');
    input.value = '';
    loading.style.display = 'block';

    try {
        const response = await fetch('/ask', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ question: question })
        });

        if (!response.ok) throw new Error('Ошибка ответа');

        const result = await response.json();

        // Передаем ответ и источники в функцию отрисовки
        addMessage(result.answer, 'assistant', result.sources);

    } catch (error) {
        addMessage("Произошла ошибка при получении ответа.", 'assistant');
    } finally {
        loading.style.display = 'none';
    }
}

    function addMessage(text, sender, sources = []) {
    const chatBox = document.getElementById('chat-box');
    const div = document.createElement('div');
    div.className = `message ${sender}`;

    // Основной текст ответа
    div.innerText = text;

    // Если есть источники (RAG), добавляем их под ответом
    if (sources && sources.length > 0) {
        const sourcesDiv = document.createElement('div');
        sourcesDiv.style.marginTop = "10px";
        sourcesDiv.style.fontSize = "0.85em";
        sourcesDiv.style.borderTop = "1px dashed #ccc";
        sourcesDiv.style.paddingTop = "5px";
        sourcesDiv.innerHTML = "<small><b>📚 Источники (RAG):</b></small>";

        sources.forEach(src => {
            const item = document.createElement('div');
            item.style.marginTop = "4px";
            item.style.background = "#f9f9f9";
            item.style.padding = "4px";
            item.style.borderRadius = "4px";
            item.innerHTML = `<small><i>[${src.type}] ${src.name}</i>: ${src.content}</small>`;
            sourcesDiv.appendChild(item);
        });

        div.appendChild(sourcesDiv);
    }

    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
}
</script>

</body>
</html>
