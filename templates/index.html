<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Processor</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e0f7e0;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            width: 100%;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            padding: 30px;
            margin-top: 20px;
        }
        h1 {
            text-align: center;
            color: #2e7d32;
            margin-bottom: 30px;
        }
        .upload-section {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .upload-area {
            flex: 1;
            min-width: 250px;
            border: 2px dashed #b0bec5;
            border-radius: 8px;
            padding: 30px 20px;
            text-align: center;
            background-color: #f8f9fa;
            transition: all 0.3s;
            position: relative;
        }
        .upload-area:hover {
            border-color: #4caf50;
            background-color: #e8f5e9;
        }
        /* Класс добавляется через JS, когда файл выбран */
        .upload-area.file-selected {
            border-color: #2e7d32;
            background-color: #c8e6c9;
        }
        .upload-area input {
            display: none;
        }
        .upload-area label {
            cursor: pointer;
            display: inline-block;
            padding: 10px 20px;
            background-color: #e0f7e0;
            border-radius: 5px;
            color: #2e7d32;
            font-weight: 500;
            margin-top: 10px;
        }
        .upload-area label:hover {
            background-color: #c8e6c9;
        }
        .upload-icon {
            font-size: 48px;
            color: #66bb6a;
            margin-bottom: 15px;
        }
        /* Блок имени файла */
        .file-name {
            margin-top: 15px;
            font-size: 14px;
            color: #555;
            word-break: break-all;
            font-weight: 600;
            min-height: 20px;
        }
        .btn-generate {
            background-color: #616161;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            max-width: 300px;
            margin: 0 auto;
            display: block;
            transition: background-color 0.3s;
        }
        .btn-generate:hover {
            background-color: #424242;
        }
        .btn-generate:disabled {
            background-color: #9e9e9e;
            cursor: not-allowed;
        }
        /* Блок результатов / статусов */
        #status-message {
            margin-top: 25px;
            padding: 15px;
            border-radius: 8px;
            display: none; /* Скрыт по умолчанию */
            text-align: center;
        }
        .status-success {
            background-color: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #a5d6a7;
        }
        .status-error {
            background-color: #ffebee;
            color: #c62828;
            border: 1px solid #ef9a9a;
        }
        /* Анимация загрузки */
        .spinner {
            display: none;
            width: 24px;
            height: 24px;
            border: 3px solid #fff;
            border-bottom-color: transparent;
            border-radius: 50%;
            animation: rotation 1s linear infinite;
            margin: 0 auto 10px;
        }
        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .result-details {
            margin-top: 15px;
            text-align: left;
            background: rgba(255,255,255,0.5);
            padding: 10px;
            border-radius: 5px;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Обработка документов</h1>

        <form id="upload-form" enctype="multipart/form-data">
            <div class="upload-section">
                <!-- Документ -->
                <div class="upload-area" id="area-document">
                    <div class="upload-icon">📄</div>
                    <p>Загрузите документ</p>
                    <input type="file" id="document" name="document" accept=".pdf,.docx,.txt">
                    <label for="document">Выбрать файл</label>
                    <div class="file-name" id="name-document">Файл не выбран</div>
                </div>

                <!-- Инструкция -->
                <div class="upload-area" id="area-instruction">
                    <div class="upload-icon">📘</div>
                    <p>Загрузите инструкцию</p>
                    <input type="file" id="instruction" name="instruction" accept=".pdf,.docx,.txt">
                    <label for="instruction">Выбрать файл</label>
                    <div class="file-name" id="name-instruction">Файл не выбран</div>
                </div>
            </div>

            <button type="submit" id="submit-btn" class="btn-generate">
                <div class="spinner" id="loading-spinner"></div>
                <span id="btn-text">Генерировать</span>
            </button>
        </form>

        <!-- Блок для сообщений -->
        <div id="status-message"></div>
    </div>

    <script>
        // 1. Отображение имени файла при выборе
        function setupFileInput(inputId, areaId, nameId) {
            const input = document.getElementById(inputId);
            const area = document.getElementById(areaId);
            const nameDisplay = document.getElementById(nameId);

            input.addEventListener('change', function() {
                if (this.files && this.files[0]) {
                    nameDisplay.textContent = this.files[0].name;
                    area.classList.add('file-selected');
                } else {
                    nameDisplay.textContent = 'Файл не выбран';
                    area.classList.remove('file-selected');
                }
            });
        }

        setupFileInput('document', 'area-document', 'name-document');
        setupFileInput('instruction', 'area-instruction', 'name-instruction');

        // 2. Обработка отправки формы (AJAX)
        document.getElementById('upload-form').addEventListener('submit', async function(e) {
            e.preventDefault();

            const docFile = document.getElementById('document').files[0];
            const instrFile = document.getElementById('instruction').files[0];
            const statusDiv = document.getElementById('status-message');
            const submitBtn = document.getElementById('submit-btn');
            const btnText = document.getElementById('btn-text');
            const spinner = document.getElementById('loading-spinner');

            // Валидация
            if (!docFile || !instrFile) {
                statusDiv.className = 'status-error';
                statusDiv.textContent = '❌ Пожалуйста, загрузите оба файла';
                statusDiv.style.display = 'block';
                return;
            }

            // UI: Состояние загрузки
            submitBtn.disabled = true;
            btnText.textContent = 'Обработка...';
            spinner.style.display = 'block';
            statusDiv.style.display = 'none';

            const formData = new FormData();
            formData.append('document', docFile);
            formData.append('instruction', instrFile);

            try {
                const response = await fetch('/generate', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    // UI: Успех
                    statusDiv.className = 'status-success';
                    statusDiv.innerHTML = `
                        ✅ ${data.message}<br>
                        <div class="result-details">
                            <strong>Документ:</strong> ${data.document.name} (${data.document.char_count} симв.)<br>
                            <strong>Инструкция:</strong> ${data.instruction.name} (${data.instruction.char_count} симв.)
                        </div>
                    `;
                } else {
                    // UI: Ошибка от сервера
                    throw new Error(data.detail || 'Ошибка обработки');
                }

            } catch (error) {
                // UI: Ошибка сети или скрипта
                statusDiv.className = 'status-error';
                statusDiv.textContent = '❌ Ошибка: ' + error.message;
            } finally {
                // Возврат кнопки в исходное состояние
                statusDiv.style.display = 'block';
                submitBtn.disabled = false;
                btnText.textContent = 'Генерировать';
                spinner.style.display = 'none';
            }
        });
    </script>
</body>
</html>
